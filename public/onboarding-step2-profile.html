<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Profile | Pulse Onboarding</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            emerald: {
              50: '#ecfdf5',
              100: '#d1fae5',
              500: '#10b981',
              600: '#059669',
              700: '#047857',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-zinc-50 font-sans text-zinc-900 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white max-w-lg w-full rounded-[2.5rem] border border-zinc-100 shadow-xl overflow-hidden flex flex-col p-8 sm:p-12 relative">
    <!-- Progress Indicator -->
    <div class="flex items-center gap-2 mb-10 w-full justify-center">
      <div class="h-1.5 w-12 rounded-full bg-emerald-600 transition-all duration-300"></div>
      <div class="h-1.5 w-12 rounded-full bg-emerald-600 transition-all duration-300"></div>
      <div class="h-1.5 w-12 rounded-full bg-zinc-200 transition-all duration-300"></div>
      <div class="h-1.5 w-12 rounded-full bg-zinc-200 transition-all duration-300"></div>
    </div>

    <!-- Illustration / Form Icon -->
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center border border-emerald-100 shadow-sm">
        <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
      </div>
    </div>

    <!-- Title -->
    <div class="text-center space-y-2 mb-6">
      <h2 class="text-2xl font-black uppercase tracking-tight text-zinc-900 mb-1">Create Your Profile</h2>
      <p class="text-zinc-500 font-medium text-xs">Enter your primary identifiers used across live checkouts.</p>
    </div>

    <!-- Form Inputs (Dummies) -->
    <div class="space-y-4 mb-8">
      <div>
        <label class="block text-[10px] font-black uppercase tracking-wider text-zinc-400 mb-2">Display Name</label>
        <input type="text" placeholder="John Doe" class="w-full bg-zinc-50 border border-zinc-200 rounded-2xl px-5 py-3.5 text-sm focus:border-emerald-600 focus:outline-none transition-colors" value="John Doe">
      </div>
      <div>
        <label class="block text-[10px] font-black uppercase tracking-wider text-zinc-400 mb-2">Email Address</label>
        <input type="email" placeholder="john@example.com" class="w-full bg-zinc-50 border border-zinc-200 rounded-2xl px-5 py-3.5 text-sm focus:border-emerald-600 focus:outline-none transition-colors">
      </div>
      <div>
        <label class="block text-[10px] font-black uppercase tracking-wider text-zinc-400 mb-2">Primary Phone (Optional)</label>
        <input type="tel" placeholder="+1 (555) 000-0000" class="w-full bg-zinc-50 border border-zinc-200 rounded-2xl px-5 py-3.5 text-sm focus:border-emerald-600 focus:outline-none transition-colors">
      </div>
    </div>

    <!-- Navigation -->
    <div class="grid grid-cols-2 gap-4">
      <a href="onboarding-step1-welcome.html" class="bg-zinc-100 hover:bg-zinc-200 text-zinc-600 font-bold uppercase py-4 rounded-2xl text-center text-xs tracking-wider transition-all">
        Back
      </a>
      <a href="onboarding-step3-preferences.html" class="bg-emerald-600 hover:bg-emerald-700 text-white font-black uppercase py-4 rounded-2xl text-center text-xs tracking-wider transition-all shadow-lg shadow-emerald-600/10">
        Next Step
      </a>
    </div>
  </div>
</body>
</html>
